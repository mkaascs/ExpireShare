env: "local" # prod, local, dev
db_host: "127.0.0.1:3306"
storage:
  type: "local"
  path: "./storage/"
  max_file_size: "500mb"
http_server:
  address: 6010
  timeout: 4s
  idle_timeout: 60s
service:
  default_ttl: 1h
  default_max_downloads: 1
  alias_length: 6
  file_worker_delay: 5m
  max_file_uploads_per_ip: 5
auth_service:
  addr: "localhost:5505"
